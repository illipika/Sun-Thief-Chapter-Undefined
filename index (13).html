<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Wheel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: black;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #wheel {
      width: min(80vw, 80vh);
      height: min(80vw, 80vh);
      cursor: pointer;
      user-select: none;
    }
    #wheel canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="wheel">
    <canvas id="c"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'Your__5_.png';

    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      eraseAndDraw();
    };

    function eraseAndDraw() {
      ctx.drawImage(img, 0, 0);
      ctx.fillStyle = '#000000';

      const w = canvas.width;
      const h = canvas.height;

      const zones = [
        { x: 560, y: 20, w: 120, h: 45 },
        { x: 290, y: 20, w: 90, h: 35 },
        { x: 270, y: 730, w: 120, h: 35 },
        { x: 590, y: 730, w: 90, h: 35 },
        { x: 330, y: 390, w: 80, h: 30 },
        { x: 1010, y: 410, w: 60, h: 30 },
        { x: 390, y: 640, w: 130, h: 30 },
        { x: 390, y: 670, w: 90, h: 25 },
        { x: 600, y: 590, w: 80, h: 25 },
        { x: 430, y: 80, w: 110, h: 25 },
        { x: 470, y: 105, w: 90, h: 22 },
        { x: 555, y: 60, w: 100, h: 25 },
        { x: 680, y: 55, w: 110, h: 25 },
        { x: 680, y: 80, w: 100, h: 22 },
        { x: 430, y: 150, w: 120, h: 22 },
        { x: 430, y: 172, w: 100, h: 20 },
        { x: 500, y: 195, w: 60, h: 20 },
        { x: 680, y: 155, w: 110, h: 22 },
        { x: 680, y: 177, w: 90, h: 20 },
        { x: 460, y: 250, w: 90, h: 22 },
        { x: 490, y: 272, w: 80, h: 20 },
        { x: 680, y: 230, w: 110, h: 22 },
        { x: 700, y: 252, w: 90, h: 20 },
        { x: 460, y: 330, w: 100, h: 22 },
        { x: 490, y: 352, w: 80, h: 20 },
        { x: 680, y: 310, w: 100, h: 22 },
        { x: 680, y: 332, w: 85, h: 20 },
        { x: 460, y: 410, w: 90, h: 22 },
        { x: 490, y: 432, w: 75, h: 20 },
        { x: 680, y: 390, w: 100, h: 22 },
        { x: 680, y: 412, w: 85, h: 20 },
        { x: 460, y: 490, w: 100, h: 22 },
        { x: 680, y: 470, w: 100, h: 22 },
        { x: 460, y: 570, w: 110, h: 22 },
        { x: 680, y: 550, w: 110, h: 22 },
        { x: 650, y: 620, w: 70, h: 22 },
        { x: 580, y: 680, w: 80, h: 22 },
      ];

      zones.forEach(z => ctx.fillRect(z.x, z.y, z.w, z.h));

      ctx.fillRect(0, 0, w, 60);
      ctx.fillRect(0, h - 60, w, 60);
      ctx.fillRect(0, 0, 60, h);
      ctx.fillRect(w - 60, 0, 60, h);
    }

    const wheel = document.getElementById('wheel');
    let currentAngle = 0;
    let targetAngle = 0;
    let spinning = false;

    function animate() {
      const diff = targetAngle - currentAngle;
      if (Math.abs(diff) < 0.05) {
        currentAngle = targetAngle;
        spinning = false;
        wheel.style.transform = `rotate(${currentAngle}deg)`;
        return;
      }
      currentAngle += diff * 0.03;
      wheel.style.transform = `rotate(${currentAngle}deg)`;
      requestAnimationFrame(animate);
    }

    function spin(direction) {
      if (spinning) return;
      spinning = true;
      targetAngle += direction === 'cw' ? 90 : -90;
      requestAnimationFrame(animate);
    }

    wheel.addEventListener('click', (e) => {
      const rect = wheel.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const norm = ((Math.atan2(dy, dx) * 180 / Math.PI) + 360) % 360;
      spin(norm < 180 ? 'cw' : 'ccw');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') spin('cw');
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') spin('ccw');
    });
  </script>
</body>
</html>

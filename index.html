<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Thief</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    cursor: none;
  }

  /* ── GIF full-bleed base ── */
  #base-gif {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center center;
    z-index: 0;
  }

  /* ── GRASS layer ──
     The PNG has a pure black background with white grass silhouettes.
     mix-blend-mode: screen makes black transparent, white stays white.
     We layer three copies: full, left-biased, right-biased — each
     animated independently so different clusters sway at different rates. */
  .grass-layer {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%; height: 60vh;
    object-fit: cover;
    object-position: bottom center;
    z-index: 10;
    mix-blend-mode: screen;
    pointer-events: none;
    transform-origin: bottom center;
    will-change: transform;
  }

  #grass-left {
    transform-origin: bottom left;
    /* crop to left half via clip-path */
    clip-path: inset(0 50% 0 0);
  }

  #grass-right {
    transform-origin: bottom right;
    clip-path: inset(0 0 0 50%);
  }

  /* full image for mid/background blades */
  #grass-full {
    opacity: 0.7;
    transform-origin: bottom center;
  }

  /* ── RING drag layer ── */
  #ring-wrap {
    position: fixed;
    z-index: 20;
    cursor: grab;
  }
  #ring-wrap:active { cursor: grabbing; }

  #ring-svg {
    display: block;
    width: 100%; height: 100%;
  }

  /* ── solved glow: very subtle white bloom ── */
  #solved-glow {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,255,255,0.10) 0%,
      rgba(255,255,255,0.04) 40%,
      transparent 70%);
    z-index: 8;
    pointer-events: none;
    opacity: 0;
    transition: opacity 3s ease;
  }

  /* ── fade to black ── */
  #fade-out {
    position: fixed; inset: 0;
    background: #000;
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 3s ease;
  }
  #fade-out.active { opacity: 1; pointer-events: all; }

  #next-link {
    position: fixed; inset: 0;
    z-index: 95;
    display: block;
    opacity: 0;
  }
  #next-link.active { opacity: 1; }

  /* cursor */
  #cursor {
    position: fixed;
    width: 4px; height: 4px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 200;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }
</style>
</head>
<body>

<div id="cursor"></div>

<!-- base animation (same folder) -->
<img id="base-gif" src="Your.gif" alt="">

<!-- solved glow -->
<div id="solved-glow"></div>

<!-- grass layers — same PNG, three times, different clip + transform-origin -->
<img class="grass-layer" id="grass-full"  src="Your__6_.png" alt="">
<img class="grass-layer" id="grass-left"  src="Your__6_.png" alt="">
<img class="grass-layer" id="grass-right" src="Your__6_.png" alt="">

<!-- invisible drag ring -->
<div id="ring-wrap">
  <svg id="ring-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <!-- fixed alignment tick at top, very faint -->
    <line x1="200" y1="2" x2="200" y2="13"
          stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-linecap="round"/>
    <!-- rotating group -->
    <g id="drag-ring">
      <!-- invisible wide stroke = drag target -->
      <circle cx="200" cy="200" r="185"
              fill="none" stroke="rgba(0,0,0,0)" stroke-width="40"/>
      <!-- faint N marker so user senses rotation -->
      <circle cx="200" cy="16" r="2.2"
              fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
    </g>
  </svg>
</div>

<div id="fade-out"></div>
<a id="next-link" href="#"></a>

<script>
// ── CURSOR ──
const cursor = document.getElementById('cursor');
let mx = innerWidth / 2, my = innerHeight / 2;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});

// ── GRASS ANIMATION ──
// mouseNorm: 0 = far left, 1 = far right, 0.5 = center (no sway)
let mouseNorm  = 0.5;
let smoothNorm = 0.5; // lerped value for smooth response

const grassFull  = document.getElementById('grass-full');
const grassLeft  = document.getElementById('grass-left');
const grassRight = document.getElementById('grass-right');

// Each cluster has its own phase offset so they don't sway in lockstep
const clusters = [
  { el: grassLeft,  phaseOffset: 0,    speedMult: 1.0,  swayMult: 1.15 },
  { el: grassRight, phaseOffset: 1.4,  speedMult: 0.85, swayMult: 0.95 },
  { el: grassFull,  phaseOffset: 0.7,  speedMult: 0.6,  swayMult: 0.55 },
];

document.addEventListener('mousemove', e => {
  mouseNorm = e.clientX / innerWidth;
});

let t = 0;
function animateGrass() {
  t += 0.012;
  // smooth follow
  smoothNorm += (mouseNorm - smoothNorm) * 0.04;

  const windBias = (smoothNorm - 0.5) * 2; // -1 to +1

  for (const c of clusters) {
    // gentle ambient sway + mouse-driven lean
    const ambient = Math.sin(t * c.speedMult + c.phaseOffset) * 0.8; // degrees
    const lean    = windBias * 2.2 * c.swayMult;                     // degrees
    const total   = ambient + lean;

    c.el.style.transform = `skewX(${total}deg)`;
  }

  requestAnimationFrame(animateGrass);
}
animateGrass();

// ── POSITION ring to match planisphere circle in the GIF ──
// GIF native ~1456×816, circle centre ~(748, 385), radius ~318px
const GIF_W = 1456, GIF_H = 816;
const C_NX = 748 / GIF_W;
const C_NY = 385 / GIF_H;
const C_NR = 318 / GIF_W;

const ringWrap   = document.getElementById('ring-wrap');
const solvedGlow = document.getElementById('solved-glow');

function positionRing() {
  const vw = innerWidth, vh = innerHeight;
  const gifAR = GIF_W / GIF_H;
  const vpAR  = vw / vh;
  let rW, rH, oX = 0, oY = 0;
  if (vpAR > gifAR) { rW = vw; rH = vw / gifAR; oY = (vh - rH) / 2; }
  else               { rH = vh; rW = vh * gifAR;  oX = (vw - rW) / 2; }

  const cx = oX + C_NX * rW;
  const cy = oY + C_NY * rH;
  const r  = C_NR * rW;
  const sz = r * 2;

  ringWrap.style.left   = (cx - r) + 'px';
  ringWrap.style.top    = (cy - r) + 'px';
  ringWrap.style.width  = sz + 'px';
  ringWrap.style.height = sz + 'px';

  const gr = r * 1.2;
  solvedGlow.style.left   = (cx - gr) + 'px';
  solvedGlow.style.top    = (cy - gr) + 'px';
  solvedGlow.style.width  = (gr * 2) + 'px';
  solvedGlow.style.height = (gr * 2) + 'px';
}
positionRing();
window.addEventListener('resize', positionRing);

// ── DRAG ROTATION ──
const dragRing = document.getElementById('drag-ring');
let ringAngle = 58, dragging = false, dragStart = 0, ringStart = 58, solved = false;

function pointerAngle(e) {
  const rect = ringWrap.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const px = e.touches ? e.touches[0].clientX : e.clientX;
  const py = e.touches ? e.touches[0].clientY : e.clientY;
  return Math.atan2(py - cy, px - cx) * 180 / Math.PI;
}

function setAngle(a) {
  ringAngle = ((a % 360) + 360) % 360;
  dragRing.setAttribute('transform', `rotate(${ringAngle}, 200, 200)`);
}

function checkSolved() {
  const n = ringAngle > 180 ? 360 - ringAngle : ringAngle;
  if (n <= 5 && !solved) triggerSolved();
}

ringWrap.addEventListener('mousedown', e => {
  if (solved) return;
  dragging = true; dragStart = pointerAngle(e); ringStart = ringAngle;
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging || solved) return;
  setAngle(ringStart + pointerAngle(e) - dragStart);
  checkSolved();
});
window.addEventListener('mouseup', () => { dragging = false; });
ringWrap.addEventListener('touchstart', e => {
  if (solved) return;
  dragging = true; dragStart = pointerAngle(e); ringStart = ringAngle;
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (!dragging || solved) return;
  setAngle(ringStart + pointerAngle(e) - dragStart);
  checkSolved();
}, { passive: true });
window.addEventListener('touchend', () => { dragging = false; });

setAngle(ringAngle);

function triggerSolved() {
  solved = true;
  ringWrap.style.cursor = 'default';
  solvedGlow.style.opacity = '1';
  setTimeout(() => {
    solvedGlow.style.opacity = '0';
    document.getElementById('fade-out').classList.add('active');
    setTimeout(() => {
      document.getElementById('next-link').classList.add('active');
    }, 3200);
  }, 2800);
}
</script>
</body>
</html>
